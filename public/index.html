<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pulse — Social App</title>
    <link href="https://fonts.googleapis.com/css2?family=Syne:wght@700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Login Container -->
    <div id="login-container" class="login-container">
        <div class="login-card">
            <h1 class="login-logo">Pulse</h1>
            
            <!-- Login Form -->
            <div id="login-form">
                <h2>Login</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="login-username" placeholder="Enter your username">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="login-password" placeholder="Enter your password">
                </div>
                <button class="btn-primary" onclick="login()">Login</button>
            </div>

            <!-- Register Form -->
            <div id="register-form" style="display:none;">
                <h2>Register</h2>
                <div class="form-group">
                    <label>Username</label>
                    <input type="text" id="reg-username" placeholder="Choose a username">
                </div>
                <div class="form-group">
                    <label>Email</label>
                    <input type="email" id="reg-email" placeholder="Enter your email">
                </div>
                <div class="form-group">
                    <label>Password</label>
                    <input type="password" id="reg-password" placeholder="Create a password">
                </div>
                <button class="btn-primary" onclick="register()">Register</button>
            </div>

            <button id="toggle-auth-btn" class="btn-toggle" onclick="toggleAuthMode()">Don't have an account? Register</button>
        </div>
    </div>

    <!-- Feed Container -->
    <div id="feed-container" style="display:none;">
        <div class="app">
            <header>
                <h1 class="logo" style="cursor: pointer;" onclick="showFeed()">Pulse</h1>
                <div class="user-info">
                    <button class="btn-profile" onclick="showProfile(currentUser.userId)">👤 Profile</button>
                    <button class="btn-logout" onclick="logout()">Logout</button>
                </div>
            </header>

            <!-- Feed View -->
            <div id="feed-view">
                <main>
                    <div class="compose-card">
                        <textarea id="post-text" placeholder="What's on your mind?"></textarea>
                        <div class="compose-actions">
                            <button class="btn-primary" onclick="createPost()">Post</button>
                        </div>
                    </div>

                    <div id="feed" class="feed-container">
                        <div class="loading">Loading posts...</div>
                    </div>
                </main>
            </div>

            <!-- Profile View -->
            <div id="profile-view" style="display:none;">
                <main>
                    <button class="btn-back" onclick="showFeed()">← Back to Feed</button>
                    
                    <div class="profile-card">
                        <div class="profile-header">
                            <div class="profile-avatar">👤</div>
                            <div class="profile-info">
                                <h2 id="profile-username"></h2>
                                <p id="profile-email"></p>
                            </div>
                        </div>

                        <div class="profile-stats">
                            <div class="stat">
                                <span class="stat-number" id="profile-posts-count">0</span>
                                <span class="stat-label">Posts</span>
                            </div>
                            <div class="stat">
                                <span class="stat-number" id="profile-followers-count">0</span>
                                <span class="stat-label">Followers</span>
                            </div>
                            <div class="stat">
                                <span class="stat-number" id="profile-following-count">0</span>
                                <span class="stat-label">Following</span>
                            </div>
                        </div>

                        <div id="profile-actions"></div>
                    </div>

                    <div class="profile-posts">
                        <h3>Posts</h3>
                        <div id="profile-feed" class="feed-container">
                            <p style="text-align:center; color:var(--muted)">No posts yet</p>
                        </div>
                    </div>
                </main>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
